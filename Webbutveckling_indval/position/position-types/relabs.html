<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Position Example</title>   
    <style>
        #Astronomi{
            background-color:rgb(162, 30, 174);
            height:400px;
            width:400px;
            position: relative;
        }
        #Kemi{
            background-color: rgb(109, 58, 192);
            height: 200px;
            width: 200px;
            position: relative;
            top:50px;
            

        }
        #Biologi{
            background-color: rgb(190, 75, 26);
            height: 100px;
            width: 100px;
            position:absolute;
            top:20px;
            left:20px; 
        }
    </style>
</head> 
<body>
    <div id="Astronomi">
        <h1>Astronomi</h1>
    </div>
    <div id="Kemi">
            <div id="Biologi">
    </div>
    </div>
    
    
</body>
</html>
