<!DOCTYPE html>
<html lang="sv">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Relabs</title>
        <style>
            #id1{
                background-color: purple;
                height: 100px;
                width: 1000px;
                position:absolute;
                top: 50px;
                left: 250px;

            }
            #id2{
                background-color: purple;
                height: 95px;
                width: 100px;
                position:relative;
                top: 220px;
                left: 500px;
            }
            #id3{
                background-color: orange;
                height: 95px;
                width: 100px;
                position:relative;
                top: 129px;
                left: 800px;
                
            }
            #id4{
                background-color: yellow;
                height: 25px;
                width:25px;
                position:absolute;
                top:35px;
                left:38px;
                
            }
            #id5{
                background-color: grey;
                height: 25px;
                width:25px;
                position: absolute;
                top: 70px;
                left:75px;

                
            }
            #id6{
                background-color: green;
                height: 100px;
                width: 1000px;
                position:absolute;
                top: 400px;
                left: 250px;
                
            }
        </style>
    </head>
    <body>
        <div id="id1"></div>
        <div id="id2"><div id="id4"></div></div>
        <div id="id3">
        <div id="id5"></div></div>
        <div id="id6"></div>
    </body>
</html>
