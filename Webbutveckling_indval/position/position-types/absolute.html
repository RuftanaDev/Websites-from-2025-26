<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Position Example</title>   
    <style>
        #Astronomi{
            background-color:rgb(162, 30, 174);
            height:100px;
            width:400px;
            position: absolute;
            right:796px;

        }
        #Kemi{
            background-color: rgb(109, 58, 192);
            height: 100px;
            width: 150px;
            position:absolute;
            bottom:100px;
            top:150px;
            left:700px;

        }
        #Biologi{
            background-color: rgb(190, 75, 26);
            height: 100px;
            width: 150px;
            position:absolute;
            left:550px;
            bottom:80px;
            top:150px;}
           
        #Programmering {
            background-color:rgb(158, 178, 46);
            height:100px;
            width:400px;
            position: absolute;
            right:796px;
            top: 300px;
        }
        #Matte{
            background-color:rgb(16, 159, 66);
            height:392px;
            width:100px;
            position: absolute;
            right:696px;
            
        }
        #Fysik{
            background-color:rgb(105, 29, 182);
            height:392px;
            width:100px;
            position: absolute;
            left:400px;
            
        }


        
    </style>
</head> 
<body>
    <div id="Astronomi">
        <h1>Astronomi</h1>
    </div>
    <div id="Kemi">
        <h1>Kemi</h1>
    </div>
    <div id="Biologi">
        <h1>Biologi</h1>
    </div>
    <div id="Programmering">
        <h1>Programmering</h1>
    </div>
    <div id="Matte">
        <h1>Matte</h1>
    </div>
    <div id="Fysik">
        <h1>Fysik</h1>
    </div>
    
</body>
</html>
